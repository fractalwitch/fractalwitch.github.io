<style>
/* ═══════════════════════════════════════════════════════════════
   THE TURNTABLE — there is no menu. you drop the needle.
   EMOTIONAL TARGET: the half-second of held breath between stylus
   touching vinyl and the first note. Navigation as anticipation.
   ═══════════════════════════════════════════════════════════════ */

body { overflow-y: auto; }

.deck-stage {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 4vh 4vw 6vh;
  gap: 1rem;
}

header.masthead { text-align: center; }
header.masthead .eyebrow { margin-bottom: .6rem; }

/* ── THE HERO — a classical backdrop that dissolves into the record ──
   Vigée Le Brun's "Venus Binding the Wings of Cupid" (1781) sits behind
   an oversized editorial title, then fades to nothing where the platter
   begins, so the painting and the turntable read as one column. ────── */
.hero { position: relative; z-index: 1; padding-top: 3.2rem; }
.hero-art {
  position: absolute; z-index: 0; pointer-events: none;
  left: 50%; top: -3vh; transform: translateX(-50%);
  width: min(1120px, 108vw); height: 74vh; max-height: 760px;
  background: url('assets/temple/venus-cupid.jpg') no-repeat center 26% / cover;
  /* keep the top of the painting, dissolve the bottom into the platter */
  -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 42%, rgba(0,0,0,.55) 66%, transparent 88%);
          mask-image: linear-gradient(to bottom, #000 0%, #000 42%, rgba(0,0,0,.55) 66%, transparent 88%);
  opacity: .96;
}
.hero-art::after {                       /* a soft veil so the title always reads */
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(125% 78% at 50% 34%,
              rgba(8,2,14,.12) 0%, rgba(8,2,14,.5) 62%, rgba(8,2,14,.72) 100%);
}
.hero .eyebrow, .hero-title, .hero-sub { position: relative; z-index: 2; }
.hero .eyebrow { color: #e9dcff; text-shadow: 0 1px 10px rgba(0,0,0,.6); }
.hero-title {
  font-family: var(--font-serif);
  font-weight: 400;
  line-height: .9;
  letter-spacing: -.005em;
  color: #fbf4ff;
  /* last shadow is an audio-reactive gold bloom — invisible at rest
     (--rx-bass 0), swelling on the low end while a track plays */
  text-shadow: 0 2px 34px rgba(0,0,0,.6), 0 1px 3px rgba(0,0,0,.55),
               0 0 calc(16px + var(--rx-bass, 0) * 46px) rgba(245,197,24, calc(var(--rx-bass, 0) * .55));
  margin: 5vh 0 0;
}
.hero-title .hl { display: block; }
.hero-title .hl-1 { font-size: clamp(2rem, 8.4vw, 4.6rem); }
.hero-title .hl-2 {
  font-size: clamp(3.4rem, 18vw, 10.5rem);
  font-style: italic;
  color: var(--gold);
  text-shadow: 0 2px 40px rgba(0,0,0,.55), 0 0 60px rgba(245,197,24,.28);
  margin: -.06em 0;
}
.hero-title .hl-3 { font-size: clamp(2.6rem, 12.5vw, 7.6rem); }
.hero-sub {
  font-family: var(--font-mono); letter-spacing: .3em; text-transform: uppercase;
  font-size: .78rem; color: #cbb8e8; margin-top: 1.1rem;
  text-shadow: 0 1px 8px rgba(0,0,0,.6);
}
@media (max-width: 640px) {
  .hero-art { height: 58vh; top: -1vh; }
  .hero-title { margin-top: 3vh; }
}

.table-wrap {
  position: relative;
  z-index: 2;                       /* the platter rides above the hero painting */
  display: grid;
  place-items: center;
  perspective: 1600px;              /* depth for the record flip */
}
.record-flipper {
  transform-style: preserve-3d;
  will-change: transform;
  transform: rotateY(0deg);
  line-height: 0;
}
#table {
  width: min(78vh, 94vw);
  height: min(78vh, 94vw);
  /* the record OWNS your finger — no scroll, no zoom, no browser gesture
     steals the drag. The rest of the page scrolls normally; only touches
     that BEGIN on the platter are captured. */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
}

/* ── SIDE CONTROL — the record has two sides; flip it underneath ──── */
.side-control {
  display: flex; align-items: center; justify-content: center; gap: .8rem;
  margin: .4rem auto 0;
}
.side-ind {
  font-family: var(--font-geo); font-weight: 600;
  font-size: .68rem; letter-spacing: .22em; text-transform: uppercase;
  color: var(--ink-dim); background: transparent;
  border: 1px solid var(--line); border-radius: 999px;
  padding: .5rem .9rem; cursor: pointer; line-height: 1.2;
  transition: color .3s, border-color .3s, box-shadow .3s;
}
.side-ind span { display: block; font-family: var(--font-mono); font-weight: 400; font-size: .52rem; letter-spacing: .1em; opacity: .7; text-transform: none; margin-top: .15rem; }
.side-ind.active { color: var(--hotpink); border-color: var(--hotpink); box-shadow: 0 0 16px rgba(255,46,136,.3); }
.flip-btn {
  flex: none; width: 46px; height: 46px; border-radius: 50%;
  border: 1px solid var(--line); background: #14040c; color: var(--gold);
  font-size: 1.3rem; cursor: pointer; line-height: 1;
  transition: transform .5s var(--ease-needle), box-shadow .3s, color .3s;
  box-shadow: 0 0 14px rgba(245,197,24,.2);
}
.flip-btn:hover { color: var(--rose); box-shadow: 0 0 22px rgba(245,197,24,.4); }
.flip-btn.spin { transform: rotate(180deg); }

/* the readout — what the needle is hovering */
.readout {
  min-height: 5.4rem;
  text-align: center;
}
.readout .room-name {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  color: var(--hotpink);
  text-shadow: 0 0 10px rgba(255,46,136,.8), 0 0 34px rgba(255,46,136,.4);
  min-height: 1.2em;
}
.readout .room-sub {
  font-family: var(--font-mono);
  color: var(--ink-dim);
  font-size: .85rem;
  letter-spacing: .04em;
}

/* liner notes — the tracklist IS the accessible navigation */
.liner {
  max-width: 620px;
  margin: 4vh auto 0;
  z-index: 2;
  position: relative;
  padding: 0 1.5rem 8vh;
}
.liner h2 {
  font-family: var(--font-geo);
  font-weight: 600;
  font-size: .78rem;
  letter-spacing: .34em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 1rem;
}
.liner .pressing-note {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--ink-dim);
  margin-top: 1.6rem;
  line-height: 1.8;
}
.liner .pressing-note a { color: var(--ink-dim); }

/* side headers inside the liner-note tracklist */
.tracklist li.side-head {
  border: 0;
  font-family: var(--font-geo);
  font-weight: 600;
  font-size: .7rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--hotpink);
  padding: 1.4rem 0 .4rem;
}
.tracklist li.side-head:first-child { padding-top: .2rem; }

@media (max-width: 700px) {
  .deck-stage { padding-top: 6vh; }
}

/* ── SIDE B GATE — a cheeky velvet-rope on "the becoming" ─────────── */
.sbgate {
  position: fixed; inset: 0; z-index: 120;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  background: rgba(2,0,5,.86);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .45s var(--ease-needle);
}
.sbgate.open { opacity: 1; pointer-events: auto; }
.sbgate-card {
  position: relative;
  width: min(30rem, 100%);
  background: linear-gradient(160deg, #17091f, #0a0410);
  border: 1px solid rgba(255,46,136,.4);
  border-radius: 14px;
  box-shadow: 0 0 60px -12px rgba(255,46,136,.5);
  padding: 2.2rem 1.8rem 2rem;
  text-align: center;
  transform: translateY(12px) scale(.98);
  transition: transform .45s var(--ease-needle);
}
.sbgate.open .sbgate-card { transform: none; }
.sbgate-eyebrow { font-family: var(--font-mono); font-size:.62rem; letter-spacing:.28em; text-transform:uppercase; color: var(--cyan); }
.sbgate h3 { font-family: var(--font-display); font-size: clamp(1.6rem,7vw,2.4rem); color: var(--hotpink); margin:.4rem 0 .3rem; letter-spacing:.02em; }
.sbgate p { font-family: var(--font-mono); font-size:.72rem; line-height:1.7; color: var(--ink-dim); margin:0 auto 1.2rem; max-width:26ch; }
.sbgate form { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
.sbgate input {
  flex: 1 1 12rem; min-width: 0;
  font-family: var(--font-mono); font-size: 1rem; letter-spacing:.3em; text-align:center; text-transform:uppercase;
  color: var(--ink); background: rgba(255,255,255,.04);
  border: 1px solid rgba(201,160,255,.3); border-radius: 8px;
  padding: .7rem .8rem;
}
.sbgate input:focus { outline:none; border-color: var(--hotpink); box-shadow: 0 0 16px -4px var(--hotpink); }
.sbgate .sbgate-go {
  font-family: var(--font-geo); font-weight:600; font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
  color: var(--void); background: var(--hotpink); border:0; border-radius:8px;
  padding: .7rem 1.3rem; cursor:pointer;
}
.sbgate .sbgate-go:hover { background: var(--rose); }
.sbgate-deny { color: var(--shout-orange); font-size:.66rem; min-height:1.1em; margin:.8rem 0 0; letter-spacing:.06em; }
.sbgate-close { position:absolute; top:.7rem; right:.9rem; background:none; border:0; color:var(--ink-dim); font-size:1.4rem; line-height:1; padding:.2rem .5rem; cursor:pointer; }
.sbgate-close:hover { color: var(--hotpink); }

/* locked Side B links in the liner-note tracklist */
.tracklist li.locked { opacity:.72; }
.tracklist li.locked a { color: var(--ink-dim); }
.tracklist li.locked a::after { content:' 🔒'; font-size:.8em; opacity:.85; }
.side-ind.locked::after { content:' 🔒'; font-size:.62em; margin-left:.15em; }
</style>
</head>
<body>

<div class="deck-stage">
  <header class="masthead hero">
    <div class="hero-art" aria-hidden="true"></div>
    <p class="eyebrow" id="eyebrow">side a · 33⅓ rpm · stereo</p>
    <h1 class="hero-title">
      <span class="hl hl-1">The Human</span>
      <span class="hl hl-2">Sexual</span>
      <span class="hl hl-3">Revolution</span>
    </h1>
    <p class="hero-sub">(ongoing)</p>
  </header>

  <div class="table-wrap">
    <div class="record-flipper" id="recordFlipper">
      <canvas id="table" aria-hidden="true"></canvas>
    </div>
  </div>

  <div class="side-control" role="group" aria-label="Record side">
    <button class="side-ind active" data-side="A" id="sideA">Side A<span>queer history</span></button>
    <button class="flip-btn" id="flipBtn" aria-label="Flip the record to the other side">⇄</button>
    <button class="side-ind" data-side="B" id="sideB">Side B<span>the becoming</span></button>
  </div>

  <div class="readout" aria-live="polite">
    <div class="room-name" id="ro-name">&nbsp;</div>
    <div class="room-sub" id="ro-sub">hover a groove · drop the needle</div>
  </div>
</div>

<!-- LINER NOTES — real links. This list is the keyboard path,
     the screen-reader path, and a design object in its own right. -->
<nav class="liner" aria-label="Rooms">
  <h2>Liner notes / tracklist</h2>
  <ol class="tracklist" id="tracklist"></ol>
  <p class="pressing-note">
    Every room works with motion stilled and sound off — tune both at the
    <a href="threshold.html">threshold</a>. Nothing on this record tracks you.
  </p>
</nav>

<script src="revolution.js?v=30"></script>
<script>
REV.boot({ scene: 'hub', room: null, track: 'assets/tracks/hub.mp3', trackTitle: 'Strobotone — San Fran (Interlude Edit)' });

/* ─────────────────────────────────────────────────────────────────
   THE RECORD
   Bands run outer edge (oldest) toward the center label (now) —
   time spirals inward, the way a record actually plays.
   `built` flips to true as each room comes off the press.
   ──────────────────────────────────────────────────────────────── */
/* THE RECORD HAS TWO SIDES.
   Side A — queer history, as it happened (A1–A5).
   Side B — the becoming: a visual-candy overture, then the frank/tender
   rooms (B1–B5). Flip the record underneath the platter to change sides;
   the liner-note tracklist below always lists both. */
const SIDE_A = [
  { id:'ancestors', title:'The Ancestors',  sub:'gender as abundance · 2400 BCE → 1866',   href:'ancestors.html', tone:164.8, built:true,  gate:false },
  { id:'thecode',   title:'The Code',       sub:'the closet as technology · 1867–1965',    href:'thecode.html',   tone:196.0, built:true,  gate:false },
  { id:'theriot',   title:'The Riot',       sub:'two holes in the archive · 1966–1969',    href:'theriot.html',   tone:110.0, built:true,  gate:false },
  { id:'thefloor',  title:'The Floor',      sub:'the glam core · 1970–1979',               href:'thefloor.html',  tone:246.9, built:true,  gate:false },
  { id:'ongoing',   title:'Ongoing',        sub:'1980 → now',                              href:'ongoing.html',   tone:329.6, built:true,  gate:false }
];
const SIDE_B = [
  { id:'triskelion', title:'The Triskelion', sub:'visual candy · ΣΩ deep flux', note:'buffer', href:'triskelion.html', tone:523.3, built:true, gate:false },
  { id:'deck',      title:'The Deviance Deck', sub:'frank · anatomical · adult · gated play',   href:'deck.html',      tone:277.2, built:true,  gate:true  },
  { id:'whatisgender', title:'The Undivided Flesh', sub:'what is gender · one origin, infinite forms', note:'interactive', href:'whatisgender.html', tone:261.6, built:true, gate:false },
  { id:'gynarchy',  title:'The Queer Gynarchy', sub:'how to dream freely · you were always already free', note:'our future?', href:'gynarchy.html', tone:392.0, built:true, gate:false },
  { id:'hitraveler', title:'The Circulation', sub:'the outward breath · circulate freely', note:'Dream Freely', href:'hitraveler.html', tone:440.0, built:true, gate:false }
];
let side = 'A';
let ROOMS = SIDE_A;

/* Each band has a MOOD — an accent color and a visual temperament that
   fires the moment the needle finds it. theriot is `dim`: selecting it
   quiets the platter and throws no sparks, honoring the hole. */
const MOODS = {
  ancestors: { accent:'#f5c518', sparks:9,  spin:1.0 },
  thecode:   { accent:'#26e0e0', sparks:7,  spin:1.0 },
  theriot:   { accent:'#ff3d00', sparks:0,  spin:0.35, dim:true },
  thefloor:  { accent:'#ff2e88', sparks:16, spin:1.35 },
  whatisgender: { accent:'#b44fff', sparks:10, spin:1.0 },
  deck:      { accent:'#c9a0ff', sparks:11, spin:0.9 },
  ongoing:   { accent:'#39ff14', sparks:14, spin:1.2 },
  gynarchy:  { accent:'#ff1493', sparks:18, spin:1.3 },
  hitraveler:{ accent:'#00F2FF', sparks:15, spin:1.25 },
  triskelion:{ accent:'#A259FF', sparks:16, spin:1.4 }
};
function moodOf(i){ return (i >= 0 && MOODS[ROOMS[i].id]) || { accent:'#ff2e88', sparks:10, spin:1.0 }; }

/* coarse pointers (phones/tablets) have no hover — the interaction is
   touch-to-preview, hold-to-drop. Mice keep hover + click. */
const COARSE = matchMedia('(hover: none), (pointer: coarse)').matches;
const REST_SUB = COARSE ? 'touch a groove · hold to drop the needle'
                        : 'hover a groove · drop the needle';

/* ── tracklist (the honest nav) — both sides, always listed ─────── */
(function buildTracklist(){
  const ol = document.getElementById('tracklist');
  function group(letter, label, rooms){
    const head = document.createElement('li');
    head.className = 'side-head';
    head.textContent = 'Side ' + letter + ' · ' + label;
    ol.appendChild(head);
    rooms.forEach(function (r, i) {
      const li = document.createElement('li');
      li.dataset.side = letter;
      if (!r.built) li.className = 'unreleased';
      const n = document.createElement('span');
      n.className = 'tno';
      n.textContent = letter + (i + 1);
      const a = document.createElement('a');
      a.href = r.built ? r.href : '#';
      a.textContent = r.title;
      if (!r.built) a.setAttribute('aria-disabled', 'true');
      a.addEventListener('click', function (e) {
        if (letter === 'B' && !sideBUnlocked) {
          e.preventDefault();
          openSideBGate(function () { routeTo(r); });
          return;
        }
        routeTo(r, e);
      });
      const d = document.createElement('span');
      d.className = 'dur';
      // explicit note wins (kept short so it right-aligns like the dates);
      // otherwise fall back to the last ·-segment of the subtitle
      d.textContent = r.note || r.sub.split('·').pop().trim();
      li.appendChild(n); li.appendChild(a); li.appendChild(d);
      ol.appendChild(li);
    });
  }
  group('A', 'queer history', SIDE_A);
  group('B', 'the becoming', SIDE_B);
})();

/* set the resting hint to match the pointer we actually have */
document.getElementById('ro-sub').textContent = REST_SUB;

/* ── THE FLIP — turn the record over ─────────────────────────────── */
let mirror = false;          // side B renders mirrored; the CSS 180° flip
                             // cancels it out, so B reads upright, not backwards
let flipping = false;
const flipper = document.getElementById('recordFlipper');
const flipBtn = document.getElementById('flipBtn');
const eyebrow = document.getElementById('eyebrow');

function updateSideUI(){
  document.getElementById('sideA').classList.toggle('active', side === 'A');
  document.getElementById('sideB').classList.toggle('active', side === 'B');
  flipBtn.classList.toggle('spin', side === 'B');
  eyebrow.textContent = 'side ' + side.toLowerCase() + ' · 33⅓ rpm · stereo';
}

function flipTo(target){
  if (flipping || target === side) return;
  // Side B is still being pressed — no flip without the word at the door
  if (target === 'B' && !sideBUnlocked) { openSideBGate(function () { flipTo('B'); }); return; }
  flipping = true;
  side = target;
  REV.audio.thunk();
  const dur = REV.stilled() ? 0 : 900;
  flipper.style.transition = dur ? ('transform ' + dur + 'ms cubic-bezier(.5,.05,.3,1)') : 'none';
  flipper.style.transform = 'rotateY(' + (side === 'B' ? 180 : 0) + 'deg)';
  // swap the platter's data at the edge-on midpoint (invisible seam)
  setTimeout(function () {
    ROOMS = (side === 'A') ? SIDE_A : SIDE_B;
    mirror = (side === 'B');
    hover = -1; pressBand = -1; holdProg = 0; committing = false; dropping = false;
    armTarget = REST_ARM; accentTarget = 0; spinTarget = 1;
    setReadout(' ', REST_SUB);
    updateSideUI();
    REV.audio.crackle(0.3);
  }, dur / 2);
  setTimeout(function () { flipping = false; }, dur + 30);
}
flipBtn.addEventListener('click', function () { flipTo(side === 'A' ? 'B' : 'A'); });
document.getElementById('sideA').addEventListener('click', function () { flipTo('A'); });
document.getElementById('sideB').addEventListener('click', function () { flipTo('B'); });

/* ── THE VELVET ROPE — Side B is gated until it's fully pressed ─────
   A cheeky soft-lock (client-side, not a vault): the word at the door
   is "DISCO". Once given, the unlock is remembered so you're not asked
   on every flip. Locks the Side B liner-note links AND the flip. ──── */
const SIDEB_PASS = 'disco';                 // case-insensitive; cheeky, not security
const SIDEB_KEY  = 'rev_sideb_unlocked';
let sideBUnlocked = (function () {
  try { return localStorage.getItem(SIDEB_KEY) === '1'; } catch (e) { return false; }
})();

const sbgate = document.createElement('div');
sbgate.className = 'sbgate';
sbgate.setAttribute('role', 'dialog');
sbgate.setAttribute('aria-modal', 'true');
sbgate.setAttribute('aria-label', 'Side B is password protected');
sbgate.innerHTML =
  '<div class="sbgate-card">' +
    '<button class="sbgate-close" type="button" aria-label="Close">×</button>' +
    '<p class="sbgate-eyebrow">side b · the becoming</p>' +
    '<h3>velvet rope</h3>' +
    '<p>side b is still being pressed. whisper the word at the door to slip past the rope.</p>' +
    '<form>' +
      '<input type="password" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="password" aria-label="Side B password">' +
      '<button class="sbgate-go" type="submit">enter</button>' +
    '</form>' +
    '<p class="sbgate-deny" role="alert"></p>' +
  '</div>';
document.body.appendChild(sbgate);

const sbInput = sbgate.querySelector('input');
const sbDeny  = sbgate.querySelector('.sbgate-deny');
let sbPending = null;                        // callback to run once unlocked

function applySideBLockUI() {
  const locked = !sideBUnlocked;
  document.querySelectorAll('#tracklist li[data-side="B"]').forEach(function (li) {
    li.classList.toggle('locked', locked);
  });
  document.getElementById('sideB').classList.toggle('locked', locked);
}

function openSideBGate(onSuccess) {
  sbPending = onSuccess || null;
  sbDeny.textContent = '';
  sbInput.value = '';
  sbgate.classList.add('open');
  if (REV.audio) REV.audio.crackle(0.3);
  setTimeout(function () { sbInput.focus(); }, 60);
}
function closeSideBGate() {
  sbgate.classList.remove('open');
  sbPending = null;
}
sbgate.querySelector('.sbgate-close').addEventListener('click', closeSideBGate);
sbgate.addEventListener('click', function (e) { if (e.target === sbgate) closeSideBGate(); });
sbgate.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSideBGate(); });
sbgate.querySelector('form').addEventListener('submit', function (e) {
  e.preventDefault();
  if (sbInput.value.trim().toLowerCase() === SIDEB_PASS) {
    sideBUnlocked = true;
    try { localStorage.setItem(SIDEB_KEY, '1'); } catch (err) {}
    applySideBLockUI();
    if (REV.audio) REV.audio.crackle(0.6);
    const cb = sbPending;
    closeSideBGate();
    if (cb) setTimeout(cb, 140);
  } else {
    sbDeny.textContent = 'not the word · try again';
    sbInput.value = '';
    sbInput.focus();
    sbgate.querySelector('.sbgate-card').animate(
      [{ transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' }, { transform: 'translateX(0)' }],
      { duration: 220 }
    );
  }
});

applySideBLockUI();   // reflect stored state on load

/* arriving from a locked Side B exit elsewhere (e.g. ongoing's run-out)
   opens the velvet rope straight away, then flips on success */
if (/[?&]sideb=1(&|$)/.test(location.search) && !sideBUnlocked) {
  openSideBGate(function () { flipTo('B'); });
}

/* gate logic: the Deck asks the threshold, never a popup */
function routeTo(room, e) {
  if (e) e.preventDefault();
  if (!room.built) {
    setReadout(room.title, 'still in the pressing plant — this groove is being cut');
    REV.audio.crackle(0.4);
    return;
  }
  if (room.gate && !REV.state.adult) {
    setReadout(room.title, 'this room asks the threshold first — routing you there');
    setTimeout(function(){ REV.navigate('threshold.html'); }, REV.stilled() ? 60 : 700);
    return;
  }
  REV.audio.crackle(0.65);
  document.title = '▶ ' + room.title;
  REV.navigate(room.href);
}

function setReadout(name, sub) {
  document.getElementById('ro-name').textContent = name;
  document.getElementById('ro-sub').textContent = sub;
}

/* ─────────────────────────────────────────────────────────────────
   THE TURNTABLE RENDERER
   Platter at a true 33⅓ RPM (ω ≈ 3.49 rad/s). Grooved bands are
   the rooms. The tonearm pivots from upper right and swings on a
   real arc — tonearms are radial creatures, not straight-line ones.
   ──────────────────────────────────────────────────────────────── */
const canvas = document.getElementById('table');
const ctx = canvas.getContext('2d');
const RPM = 100 / 3;                       // 33.333…
const OMEGA = RPM / 60 * Math.PI * 2;      // rad/s
let W, H, CX, CY, R, dpr;

const BAND_OUT = 0.96, BAND_IN = 0.42;     // annulus of playable vinyl
const LABEL_R = 0.34;

const REST_ARM = -0.62;
let phase = 0;                              // platter rotation
let spinScale = 1;                          // eased per-room speed multiplier
let spinTarget = 1;
let hover = -1;                             // highlighted band index
let armAngle = REST_ARM;                    // current tonearm angle (rad)
let armTarget = REST_ARM;                   // resting pose
let dropping = false;
let lastT = performance.now();

/* accent wash — the selected room's color bleeds into the platter */
let accent = '#ff2e88';
let accentLevel = 0;                        // 0 → 1 eased
let accentTarget = 0;

/* sparks thrown off a groove when the needle finds it */
let sparks = [];                            // {ang, r, life, hue, size}

/* HOLD-TO-DROP (touch): press a band, a ring fills, the needle drops */
const HOLD_MS = 1400;
let pressBand = -1;                          // band the finger is holding
let holdT0 = 0;
let holdProg = 0;                            // 0 → 1
let committing = false;
let lastPT = 'mouse';                        // pointerType of last interaction
let lastStemT = 0;                           // throttle stem retrigger

function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + (n >> 16 & 255) + ',' + (n >> 8 & 255) + ',' + (n & 255) + ',' + a + ')';
}
function igniteSparks(i) {
  const m = moodOf(i);
  if (!m.sparks) return;                     // theriot throws none
  const b = bandRadii(i);
  for (let k = 0; k < m.sparks; k++) {
    sparks.push({
      ang: Math.random() * 6.283,
      r: (b.inn + Math.random() * (b.out - b.inn)) / R,   // stored as fraction
      life: 1,
      hue: m.accent,
      size: 1 + Math.random() * 2.4
    });
  }
}

function resize() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  const size = canvas.getBoundingClientRect().width;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  W = H = size; CX = W / 2; CY = H / 2;
  R = size * 0.47;
}
addEventListener('resize', resize);
resize();

/* band geometry: outer → inner, equal annular thickness */
function bandRadii(i) {
  const step = (BAND_OUT - BAND_IN) / ROOMS.length;
  const out = BAND_OUT - step * i;
  return { out: out * R, inn: (out - step) * R, mid: (out - step / 2) * R };
}
function bandAt(dist) {
  for (let i = 0; i < ROOMS.length; i++) {
    const b = bandRadii(i);
    if (dist <= b.out && dist >= b.inn) return i;
  }
  return -1;
}

/* tonearm: pivot floats off the platter's top right corner */
function pivot() { return { x: CX + R * 1.02, y: CY - R * 1.02 }; }
function armAngleFor(radius) {
  // aim the stylus at a point on the platter's right side at `radius`
  const p = pivot();
  const target = { x: CX + radius * 0.72, y: CY - radius * 0.12 };
  return Math.atan2(target.y - p.y, target.x - p.x);
}

/* ── draw ───────────────────────────────────────────────────────── */
function draw(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  // audio-reactive bands (frozen in stilled/reduced-motion)
  const rx = (REV.stilled() || !REV.audio.bands) ? { bass:0, mid:0, high:0, level:0 } : REV.audio.bands(now);
  spinScale += (spinTarget - spinScale) * Math.min(1, dt * 3);
  if (!REV.stilled()) phase += OMEGA * dt * spinScale;
  armAngle += (armTarget - armAngle) * Math.min(1, dt * 6);
  accentLevel += (accentTarget - accentLevel) * Math.min(1, dt * 5);

  /* hold-to-drop timing (touch): fill the ring, then commit.
     Runs even in stilled mode — it's a navigation timer, not motion. */
  if (pressBand >= 0 && !committing) {
    holdProg = Math.min(1, (now - holdT0) / HOLD_MS);
    if (holdProg >= 1) commit(ROOMS[pressBand]);
  } else if (pressBand < 0) {
    holdProg = 0;
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  // Side B: mirror the drawing so that the CSS 180° flip of the platter
  // lands the content upright (two horizontal mirrors cancel). Band
  // hit-testing is by radius from center, so it's unaffected.
  if (mirror) { ctx.translate(W, 0); ctx.scale(-1, 1); }

  /* plinth shadow */
  ctx.beginPath(); ctx.arc(CX, CY + 6, R, 0, 7);
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fill();

  /* vinyl body */
  const vinyl = ctx.createRadialGradient(CX, CY, R * 0.1, CX, CY, R);
  vinyl.addColorStop(0, '#17081f');
  vinyl.addColorStop(0.6, '#0b0310');
  vinyl.addColorStop(1, '#050108');
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 7);
  ctx.fillStyle = vinyl; ctx.fill();

  /* audio-reactive bloom — the whole platter glows to the low end */
  if (rx.bass > 0.01) {
    const a = Math.min(0.5, rx.bass * 0.62);
    const bl = ctx.createRadialGradient(CX, CY, R * 0.1, CX, CY, R);
    bl.addColorStop(0, hexA('#f5c518', a));
    bl.addColorStop(0.55, hexA('#f5c518', a * 0.28));
    bl.addColorStop(1, hexA('#f5c518', 0));
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, 7); ctx.fillStyle = bl; ctx.fill();
    ctx.restore();
  }

  /* rotating sheen — the light that tells your eye it's spinning */
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(phase * 0.5);
  const sheen = ctx.createLinearGradient(-R, 0, R, 0);
  sheen.addColorStop(0.42, 'rgba(201,160,255,0)');
  sheen.addColorStop(0.5, 'rgba(201,160,255,.10)');
  sheen.addColorStop(0.58, 'rgba(201,160,255,0)');
  ctx.beginPath(); ctx.arc(0, 0, R, 0, 7);
  ctx.fillStyle = sheen; ctx.fill();
  ctx.restore();

  /* accent wash — the selected room's color bleeds up through the vinyl */
  if (accentLevel > 0.01) {
    const aw = ctx.createRadialGradient(CX, CY, R * 0.2, CX, CY, R);
    aw.addColorStop(0, hexA(accent, 0.22 * accentLevel));
    aw.addColorStop(0.7, hexA(accent, 0.08 * accentLevel));
    aw.addColorStop(1, hexA(accent, 0));
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, 7);
    ctx.fillStyle = aw; ctx.fill();
  }

  /* grooves */
  ctx.lineWidth = 1;
  for (let g = 0; g < 64; g++) {
    const r = (BAND_IN + (BAND_OUT - BAND_IN) * (g / 64)) * R;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, 7);
    ctx.strokeStyle = 'rgba(255,255,255,' + (g % 8 === 0 ? 0.07 : 0.028) + ')';
    ctx.stroke();
  }

  /* band edges + hover glow */
  for (let i = 0; i < ROOMS.length; i++) {
    const b = bandRadii(i);
    if (i === hover) {
      const acc = moodOf(i).accent;
      const swell = 1 + holdProg * 0.7;               // the band brightens as you hold
      ctx.beginPath(); ctx.arc(CX, CY, b.mid, 0, 7);
      ctx.lineWidth = (b.out - b.inn) * 0.86;
      ctx.strokeStyle = ROOMS[i].built ? hexA(acc, 0.13 * swell) : 'rgba(157,143,176,.09)';
      ctx.stroke();
      ctx.beginPath(); ctx.arc(CX, CY, b.mid, 0, 7);
      ctx.lineWidth = 1.4 * swell;
      ctx.strokeStyle = ROOMS[i].built ? hexA(acc, Math.min(1, 0.75 * swell)) : 'rgba(157,143,176,.5)';
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(CX, CY, b.inn, 0, 7);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(2,0,5,.9)';
    ctx.stroke();
  }

  /* sparks — thrown off the groove when the needle lands, riding the spin */
  if (sparks.length) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let s = sparks.length - 1; s >= 0; s--) {
      const sp = sparks[s];
      sp.life -= dt * 0.9;
      if (sp.life <= 0) { sparks.splice(s, 1); continue; }
      const a = sp.ang + phase * spinScale;            // sparks orbit with the platter
      const rr = sp.r * R;
      const px = CX + Math.cos(a) * rr, py = CY + Math.sin(a) * rr;
      ctx.globalAlpha = sp.life * 0.9;
      ctx.fillStyle = sp.hue;
      ctx.beginPath(); ctx.arc(px, py, sp.size * sp.life, 0, 7); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  /* hold ring — the needle-drop timer, filling clockwise around the label */
  if (holdProg > 0) {
    const rr = LABEL_R * R + R * 0.05;
    ctx.beginPath(); ctx.arc(CX, CY, rr, 0, 7);
    ctx.lineWidth = R * 0.02;
    ctx.strokeStyle = hexA(accent, 0.18);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(CX, CY, rr, -Math.PI / 2, -Math.PI / 2 + holdProg * 6.2832);
    ctx.lineWidth = R * 0.024;
    ctx.lineCap = 'round';
    ctx.strokeStyle = hexA(accent, 0.95);
    ctx.stroke();
  }

  /* center label — harvest gold, spinning title, spindle */
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(phase);
  const lg = ctx.createRadialGradient(0, 0, 2, 0, 0, LABEL_R * R);
  lg.addColorStop(0, '#f7d33f');
  lg.addColorStop(1, '#b98f0e');
  ctx.beginPath(); ctx.arc(0, 0, LABEL_R * R, 0, 7);
  ctx.fillStyle = lg; ctx.fill();
  ctx.fillStyle = '#241a2e';
  ctx.font = '600 ' + Math.max(10, R * 0.045) + 'px "Josefin Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('THE HUMAN SEXUAL', 0, -R * 0.06);
  ctx.fillText('REVOLUTION', 0, -R * 0.015);
  ctx.font = 'italic ' + Math.max(8, R * 0.032) + 'px "Courier Prime", monospace';
  ctx.fillText((side === 'A' ? 'SIDE A' : 'SIDE B') + ' · 33⅓', 0, R * 0.045);
  ctx.beginPath(); ctx.arc(0, 0, R * 0.014, 0, 7);
  ctx.fillStyle = '#050108'; ctx.fill();
  ctx.restore();

  /* label heartbeat — a gold halo blooming out of the label on the kick */
  if (rx.bass > 0.02) {
    const r2 = LABEL_R * R;
    const hg = ctx.createRadialGradient(CX, CY, r2 * 0.7, CX, CY, r2 * 1.6);
    hg.addColorStop(0, hexA('#f7d33f', Math.min(0.55, rx.bass * 0.7)));
    hg.addColorStop(1, hexA('#f7d33f', 0));
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath(); ctx.arc(CX, CY, r2 * 1.6, 0, 7); ctx.fillStyle = hg; ctx.fill();
    ctx.restore();
  }

  drawArm();

  requestAnimationFrame(draw);
}

function drawArm() {
  const p = pivot();
  const len = R * 1.35;
  const ex = p.x + Math.cos(armAngle) * len;
  const ey = p.y + Math.sin(armAngle) * len;

  /* counterweight + pivot base */
  ctx.beginPath(); ctx.arc(p.x, p.y, R * 0.055, 0, 7);
  ctx.fillStyle = '#2a1a33'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(201,160,255,.35)'; ctx.stroke();
  const back = R * 0.16;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x - Math.cos(armAngle) * back, p.y - Math.sin(armAngle) * back);
  ctx.lineWidth = R * 0.028;
  ctx.strokeStyle = '#8fa3b8'; ctx.stroke();

  /* the arm — chrome line with a soft shadow beneath */
  ctx.beginPath();
  ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey + 3);
  ctx.lineWidth = R * 0.02;
  ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey);
  ctx.lineWidth = R * 0.016;
  const arm = ctx.createLinearGradient(p.x, p.y, ex, ey);
  arm.addColorStop(0, '#d9e4f0'); arm.addColorStop(1, '#8fa3b8');
  ctx.strokeStyle = arm; ctx.stroke();

  /* headshell + stylus */
  ctx.save();
  ctx.translate(ex, ey);
  ctx.rotate(armAngle + 0.5);
  ctx.fillStyle = dropping ? '#ff2e88' : '#f5c518';
  ctx.fillRect(-R * 0.035, -R * 0.014, R * 0.07, R * 0.028);
  ctx.restore();
}

requestAnimationFrame(draw);

/* ── pointer ────────────────────────────────────────────────────── */
/* INTERACTION -- one model, two bodies.
   Mouse: hover a groove to preview, click to drop in (fast path).
   Touch/pen: touch a groove to preview (the record eats the scroll),
   then HOLD to drop the needle -- a ring fills and carries you in.
   A tap alone never navigates: you have to mean it. */
function pick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  return bandAt(Math.hypot(x - CX, y - CY));
}

function selectBand(i) {
  if (i === hover) return;
  hover = i;
  if (i >= 0) {
    const r = ROOMS[i], m = moodOf(i);
    setReadout(r.title, r.built
      ? (COARSE ? 'hold to drop the needle' : r.sub)
      : r.sub + ' · pressing soon');
    armTarget = armAngleFor(bandRadii(i).mid);
    accent = m.accent; accentTarget = 1; spinTarget = m.spin;
    igniteSparks(i);
    const t = performance.now();
    if (t - lastStemT > 110) { REV.audio.stem(r.id, r.tone); lastStemT = t; }
  } else {
    setReadout(' ', REST_SUB);
    armTarget = REST_ARM;
    accentTarget = 0; spinTarget = 1;
  }
}

function liftNeedle() {
  pressBand = -1; holdProg = 0;
  selectBand(-1);
}

function commit(room) {
  if (committing || dropping) return;
  committing = true; dropping = true;
  REV.audio.thunk();
  setTimeout(function () { routeTo(room, null); }, REV.stilled() ? 40 : 260);
}

/* MOUSE hover previews; TOUCH/PEN drag eats the scroll, reselects the
   groove, and resets the hold timer whenever the finger crosses bands. */
canvas.addEventListener('pointermove', function (e) {
  if (e.pointerType === 'mouse') { if (!dropping) selectBand(pick(e)); return; }
  if (dropping) return;
  e.preventDefault();
  const i = pick(e);
  if (i !== hover) {
    selectBand(i);
    if (i >= 0 && ROOMS[i].built) { pressBand = i; holdT0 = performance.now(); }
    else pressBand = -1;
  }
}, { passive: false });

canvas.addEventListener('pointerleave', function (e) {
  if (e.pointerType !== 'mouse' || dropping) return;
  selectBand(-1);
});

canvas.addEventListener('click', function () {
  if (lastPT !== 'mouse') return;
  if (hover < 0 || dropping) return;
  commit(ROOMS[hover]);
});

/* TOUCH / PEN -- press to preview, hold to enter */
canvas.addEventListener('pointerdown', function (e) {
  lastPT = e.pointerType;
  if (e.pointerType === 'mouse') return;
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  const i = pick(e);
  selectBand(i);
  if (i >= 0 && ROOMS[i].built) { pressBand = i; holdT0 = performance.now(); }
  else pressBand = -1;
}, { passive: false });

function touchEnd(e) {
  if (e.pointerType === 'mouse') return;
  if (committing) return;
  liftNeedle();
}
canvas.addEventListener('pointerup', touchEnd);
canvas.addEventListener('pointercancel', touchEnd);
</script>
</body>
