<!DOCTYPE html>
<html lang="en" data-motion="full">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="An interactive history of the sexual revolution, navigated like a record. Drop the needle on a room.">

<script>try{var _t=JSON.parse(localStorage.getItem("revolution.threshold.v1"));if(_t&&_t.theme==="dark")document.documentElement.dataset.theme="disco";}catch(e){}</script>
<style>
/* ═══════════════════════════════════════════════════════════════
   THE TURNTABLE — there is no menu. you drop the needle.
   EMOTIONAL TARGET: the half-second of held breath between stylus
   touching vinyl and the first note. Navigation as anticipation.
   ═══════════════════════════════════════════════════════════════ */

body { overflow-y: auto; }

.deck-stage {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 4vh 4vw 6vh;
  gap: 1rem;
}

header.masthead { text-align: center; }
header.masthead h1 {
  font-size: clamp(1.7rem, 4.6vw, 3.1rem);
  line-height: 1.1;
}
header.masthead .eyebrow { margin-bottom: .6rem; }

.table-wrap {
  position: relative;
  display: grid;
  place-items: center;
}
#table {
  width: min(78vh, 94vw);
  height: min(78vh, 94vw);
  /* the record OWNS your finger — no scroll, no zoom, no browser gesture
     steals the drag. The rest of the page scrolls normally; only touches
     that BEGIN on the platter are captured. */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
}

/* the readout — what the needle is hovering */
.readout {
  min-height: 5.4rem;
  text-align: center;
}
.readout .room-name {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  color: var(--hotpink);
  text-shadow: 0 0 10px rgba(255,46,136,.8), 0 0 34px rgba(255,46,136,.4);
  min-height: 1.2em;
}
.readout .room-sub {
  font-family: var(--font-mono);
  color: var(--ink-dim);
  font-size: .85rem;
  letter-spacing: .04em;
}

/* liner notes — the tracklist IS the accessible navigation */
.liner {
  max-width: 620px;
  margin: 4vh auto 0;
  z-index: 2;
  position: relative;
  padding: 0 1.5rem 8vh;
}
.liner h2 {
  font-family: var(--font-geo);
  font-weight: 600;
  font-size: .78rem;
  letter-spacing: .34em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 1rem;
}
.liner .pressing-note {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--ink-dim);
  margin-top: 1.6rem;
  line-height: 1.8;
}
.liner .pressing-note a { color: var(--ink-dim); }

@media (max-width: 700px) {
  .deck-stage { padding-top: 6vh; }
}
</style>
</head>
<body>

<div class="deck-stage">
  <header class="masthead">
    <p class="eyebrow">side a · 33⅓ rpm · stereo</p>
    <h1 class="display chrome-text">The Human Sexual Revolution</h1>
    <p class="archive-voice" style="color:var(--ink-dim); font-size:.8rem;">(ongoing)</p>
  </header>

  <div class="table-wrap">
    <canvas id="table" aria-hidden="true"></canvas>
  </div>

  <div class="readout" aria-live="polite">
    <div class="room-name" id="ro-name">&nbsp;</div>
    <div class="room-sub" id="ro-sub">hover a groove · drop the needle</div>
  </div>
</div>

<!-- LINER NOTES — real links. This list is the keyboard path,
     the screen-reader path, and a design object in its own right. -->
<nav class="liner" aria-label="Rooms">
  <h2>Liner notes / tracklist</h2>
  <ol class="tracklist" id="tracklist"></ol>
  <p class="pressing-note">
    Every room works with motion stilled and sound off — tune both at the
    <a href="threshold.html">threshold</a>. Nothing on this record tracks you.
  </p>
</nav>

<script src="revolution.js?v=18"></script>
<script>
REV.boot({ scene: 'hub', room: null });

/* ─────────────────────────────────────────────────────────────────
   THE RECORD
   Bands run outer edge (oldest) toward the center label (now) —
   time spirals inward, the way a record actually plays.
   `built` flips to true as each room comes off the press.
   ──────────────────────────────────────────────────────────────── */
const ROOMS = [
  { id:'ancestors', title:'The Ancestors',  sub:'gender as abundance · 2400 BCE → 1866',   href:'ancestors.html', tone:164.8, built:true,  gate:false },
  { id:'thecode',   title:'The Code',       sub:'the closet as technology · 1867–1965',    href:'thecode.html',   tone:196.0, built:true,  gate:false },
  { id:'theriot',   title:'The Riot',       sub:'two holes in the archive · 1966–1969',    href:'theriot.html',   tone:110.0, built:true,  gate:false },
  { id:'thefloor',  title:'The Floor',      sub:'the glam core · 1970–1979',               href:'thefloor.html',  tone:246.9, built:true,  gate:false },
  { id:'ongoing',   title:'Ongoing',        sub:'1980 → now',           href:'ongoing.html',   tone:329.6, built:true,  gate:false },
  { id:'deck',      title:'The Deviance Deck', sub:'frank · anatomical · adult · gated play',   href:'deck.html',      tone:277.2, built:true,  gate:true  },
  { id:'whatisgender', title:'The Undivided Flesh', sub:'what is gender · one origin, infinite forms', note:'interactive', href:'whatisgender.html', tone:261.6, built:true, gate:false },
  { id:'gynarchy',  title:'The Queer Gynarchy', sub:'how to dream freely · you were always already free', note:'our future?', href:'gynarchy.html', tone:392.0, built:true, gate:false }
];

/* Each band has a MOOD — an accent color and a visual temperament that
   fires the moment the needle finds it. theriot is `dim`: selecting it
   quiets the platter and throws no sparks, honoring the hole. */
const MOODS = {
  ancestors: { accent:'#f5c518', sparks:9,  spin:1.0 },
  thecode:   { accent:'#26e0e0', sparks:7,  spin:1.0 },
  theriot:   { accent:'#ff3d00', sparks:0,  spin:0.35, dim:true },
  thefloor:  { accent:'#ff2e88', sparks:16, spin:1.35 },
  whatisgender: { accent:'#b44fff', sparks:10, spin:1.0 },
  deck:      { accent:'#c9a0ff', sparks:11, spin:0.9 },
  ongoing:   { accent:'#39ff14', sparks:14, spin:1.2 },
  gynarchy:  { accent:'#ff1493', sparks:18, spin:1.3 }
};
function moodOf(i){ return (i >= 0 && MOODS[ROOMS[i].id]) || { accent:'#ff2e88', sparks:10, spin:1.0 }; }

/* coarse pointers (phones/tablets) have no hover — the interaction is
   touch-to-preview, hold-to-drop. Mice keep hover + click. */
const COARSE = matchMedia('(hover: none), (pointer: coarse)').matches;
const REST_SUB = COARSE ? 'touch a groove · hold to drop the needle'
                        : 'hover a groove · drop the needle';

/* ── tracklist (the honest nav) ─────────────────────────────────── */
(function buildTracklist(){
  const ol = document.getElementById('tracklist');
  ROOMS.forEach(function (r, i) {
    const li = document.createElement('li');
    if (!r.built) li.className = 'unreleased';
    const n = document.createElement('span');
    n.className = 'tno';
    n.textContent = 'A' + (i + 1);
    const a = document.createElement('a');
    a.href = r.built ? r.href : '#';
    a.textContent = r.title;
    if (!r.built) a.setAttribute('aria-disabled', 'true');
    a.addEventListener('click', function (e) { routeTo(r, e); });
    const d = document.createElement('span');
    d.className = 'dur';
    // explicit note wins (kept short so it right-aligns like the dates);
    // otherwise fall back to the last ·-segment of the subtitle
    d.textContent = r.note || r.sub.split('·').pop().trim();
    li.appendChild(n); li.appendChild(a); li.appendChild(d);
    ol.appendChild(li);
  });
})();

/* set the resting hint to match the pointer we actually have */
document.getElementById('ro-sub').textContent = REST_SUB;

/* gate logic: the Deck asks the threshold, never a popup */
function routeTo(room, e) {
  if (e) e.preventDefault();
  if (!room.built) {
    setReadout(room.title, 'still in the pressing plant — this groove is being cut');
    REV.audio.crackle(0.4);
    return;
  }
  if (room.gate && !REV.state.adult) {
    setReadout(room.title, 'this room asks the threshold first — routing you there');
    setTimeout(function(){ location.href = 'threshold.html'; }, 900);
    return;
  }
  REV.audio.crackle(0.65);
  document.title = '▶ ' + room.title;
  setTimeout(function(){ location.href = room.href; }, REV.stilled() ? 60 : 620);
}

function setReadout(name, sub) {
  document.getElementById('ro-name').textContent = name;
  document.getElementById('ro-sub').textContent = sub;
}

/* ─────────────────────────────────────────────────────────────────
   THE TURNTABLE RENDERER
   Platter at a true 33⅓ RPM (ω ≈ 3.49 rad/s). Grooved bands are
   the rooms. The tonearm pivots from upper right and swings on a
   real arc — tonearms are radial creatures, not straight-line ones.
   ──────────────────────────────────────────────────────────────── */
const canvas = document.getElementById('table');
const ctx = canvas.getContext('2d');
const RPM = 100 / 3;                       // 33.333…
const OMEGA = RPM / 60 * Math.PI * 2;      // rad/s
let W, H, CX, CY, R, dpr;

const BAND_OUT = 0.96, BAND_IN = 0.42;     // annulus of playable vinyl
const LABEL_R = 0.34;

const REST_ARM = -0.62;
let phase = 0;                              // platter rotation
let spinScale = 1;                          // eased per-room speed multiplier
let spinTarget = 1;
let hover = -1;                             // highlighted band index
let armAngle = REST_ARM;                    // current tonearm angle (rad)
let armTarget = REST_ARM;                   // resting pose
let dropping = false;
let lastT = performance.now();

/* accent wash — the selected room's color bleeds into the platter */
let accent = '#ff2e88';
let accentLevel = 0;                        // 0 → 1 eased
let accentTarget = 0;

/* sparks thrown off a groove when the needle finds it */
let sparks = [];                            // {ang, r, life, hue, size}

/* HOLD-TO-DROP (touch): press a band, a ring fills, the needle drops */
const HOLD_MS = 1400;
let pressBand = -1;                          // band the finger is holding
let holdT0 = 0;
let holdProg = 0;                            // 0 → 1
let committing = false;
let lastPT = 'mouse';                        // pointerType of last interaction
let lastStemT = 0;                           // throttle stem retrigger

function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + (n >> 16 & 255) + ',' + (n >> 8 & 255) + ',' + (n & 255) + ',' + a + ')';
}
function igniteSparks(i) {
  const m = moodOf(i);
  if (!m.sparks) return;                     // theriot throws none
  const b = bandRadii(i);
  for (let k = 0; k < m.sparks; k++) {
    sparks.push({
      ang: Math.random() * 6.283,
      r: (b.inn + Math.random() * (b.out - b.inn)) / R,   // stored as fraction
      life: 1,
      hue: m.accent,
      size: 1 + Math.random() * 2.4
    });
  }
}

function resize() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  const size = canvas.getBoundingClientRect().width;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  W = H = size; CX = W / 2; CY = H / 2;
  R = size * 0.47;
}
addEventListener('resize', resize);
resize();

/* band geometry: outer → inner, equal annular thickness */
function bandRadii(i) {
  const step = (BAND_OUT - BAND_IN) / ROOMS.length;
  const out = BAND_OUT - step * i;
  return { out: out * R, inn: (out - step) * R, mid: (out - step / 2) * R };
}
function bandAt(dist) {
  for (let i = 0; i < ROOMS.length; i++) {
    const b = bandRadii(i);
    if (dist <= b.out && dist >= b.inn) return i;
  }
  return -1;
}

/* tonearm: pivot floats off the platter's top right corner */
function pivot() { return { x: CX + R * 1.02, y: CY - R * 1.02 }; }
function armAngleFor(radius) {
  // aim the stylus at a point on the platter's right side at `radius`
  const p = pivot();
  const target = { x: CX + radius * 0.72, y: CY - radius * 0.12 };
  return Math.atan2(target.y - p.y, target.x - p.x);
}

/* ── draw ───────────────────────────────────────────────────────── */
function draw(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  spinScale += (spinTarget - spinScale) * Math.min(1, dt * 3);
  if (!REV.stilled()) phase += OMEGA * dt * spinScale;
  armAngle += (armTarget - armAngle) * Math.min(1, dt * 6);
  accentLevel += (accentTarget - accentLevel) * Math.min(1, dt * 5);

  /* hold-to-drop timing (touch): fill the ring, then commit.
     Runs even in stilled mode — it's a navigation timer, not motion. */
  if (pressBand >= 0 && !committing) {
    holdProg = Math.min(1, (now - holdT0) / HOLD_MS);
    if (holdProg >= 1) commit(ROOMS[pressBand]);
  } else if (pressBand < 0) {
    holdProg = 0;
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  /* plinth shadow */
  ctx.beginPath(); ctx.arc(CX, CY + 6, R, 0, 7);
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fill();

  /* vinyl body */
  const vinyl = ctx.createRadialGradient(CX, CY, R * 0.1, CX, CY, R);
  vinyl.addColorStop(0, '#17081f');
  vinyl.addColorStop(0.6, '#0b0310');
  vinyl.addColorStop(1, '#050108');
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 7);
  ctx.fillStyle = vinyl; ctx.fill();

  /* rotating sheen — the light that tells your eye it's spinning */
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(phase * 0.5);
  const sheen = ctx.createLinearGradient(-R, 0, R, 0);
  sheen.addColorStop(0.42, 'rgba(201,160,255,0)');
  sheen.addColorStop(0.5, 'rgba(201,160,255,.10)');
  sheen.addColorStop(0.58, 'rgba(201,160,255,0)');
  ctx.beginPath(); ctx.arc(0, 0, R, 0, 7);
  ctx.fillStyle = sheen; ctx.fill();
  ctx.restore();

  /* accent wash — the selected room's color bleeds up through the vinyl */
  if (accentLevel > 0.01) {
    const aw = ctx.createRadialGradient(CX, CY, R * 0.2, CX, CY, R);
    aw.addColorStop(0, hexA(accent, 0.22 * accentLevel));
    aw.addColorStop(0.7, hexA(accent, 0.08 * accentLevel));
    aw.addColorStop(1, hexA(accent, 0));
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, 7);
    ctx.fillStyle = aw; ctx.fill();
  }

  /* grooves */
  ctx.lineWidth = 1;
  for (let g = 0; g < 64; g++) {
    const r = (BAND_IN + (BAND_OUT - BAND_IN) * (g / 64)) * R;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, 7);
    ctx.strokeStyle = 'rgba(255,255,255,' + (g % 8 === 0 ? 0.07 : 0.028) + ')';
    ctx.stroke();
  }

  /* band edges + hover glow */
  for (let i = 0; i < ROOMS.length; i++) {
    const b = bandRadii(i);
    if (i === hover) {
      const acc = moodOf(i).accent;
      const swell = 1 + holdProg * 0.7;               // the band brightens as you hold
      ctx.beginPath(); ctx.arc(CX, CY, b.mid, 0, 7);
      ctx.lineWidth = (b.out - b.inn) * 0.86;
      ctx.strokeStyle = ROOMS[i].built ? hexA(acc, 0.13 * swell) : 'rgba(157,143,176,.09)';
      ctx.stroke();
      ctx.beginPath(); ctx.arc(CX, CY, b.mid, 0, 7);
      ctx.lineWidth = 1.4 * swell;
      ctx.strokeStyle = ROOMS[i].built ? hexA(acc, Math.min(1, 0.75 * swell)) : 'rgba(157,143,176,.5)';
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(CX, CY, b.inn, 0, 7);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(2,0,5,.9)';
    ctx.stroke();
  }

  /* sparks — thrown off the groove when the needle lands, riding the spin */
  if (sparks.length) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let s = sparks.length - 1; s >= 0; s--) {
      const sp = sparks[s];
      sp.life -= dt * 0.9;
      if (sp.life <= 0) { sparks.splice(s, 1); continue; }
      const a = sp.ang + phase * spinScale;            // sparks orbit with the platter
      const rr = sp.r * R;
      const px = CX + Math.cos(a) * rr, py = CY + Math.sin(a) * rr;
      ctx.globalAlpha = sp.life * 0.9;
      ctx.fillStyle = sp.hue;
      ctx.beginPath(); ctx.arc(px, py, sp.size * sp.life, 0, 7); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  /* hold ring — the needle-drop timer, filling clockwise around the label */
  if (holdProg > 0) {
    const rr = LABEL_R * R + R * 0.05;
    ctx.beginPath(); ctx.arc(CX, CY, rr, 0, 7);
    ctx.lineWidth = R * 0.02;
    ctx.strokeStyle = hexA(accent, 0.18);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(CX, CY, rr, -Math.PI / 2, -Math.PI / 2 + holdProg * 6.2832);
    ctx.lineWidth = R * 0.024;
    ctx.lineCap = 'round';
    ctx.strokeStyle = hexA(accent, 0.95);
    ctx.stroke();
  }

  /* center label — harvest gold, spinning title, spindle */
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(phase);
  const lg = ctx.createRadialGradient(0, 0, 2, 0, 0, LABEL_R * R);
  lg.addColorStop(0, '#f7d33f');
  lg.addColorStop(1, '#b98f0e');
  ctx.beginPath(); ctx.arc(0, 0, LABEL_R * R, 0, 7);
  ctx.fillStyle = lg; ctx.fill();
  ctx.fillStyle = '#241a2e';
  ctx.font = '600 ' + Math.max(10, R * 0.045) + 'px "Josefin Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('THE HUMAN SEXUAL', 0, -R * 0.06);
  ctx.fillText('REVOLUTION', 0, -R * 0.015);
  ctx.font = 'italic ' + Math.max(8, R * 0.032) + 'px "Courier Prime", monospace';
  ctx.fillText('(ongoing) · 33⅓', 0, R * 0.045);
  ctx.beginPath(); ctx.arc(0, 0, R * 0.014, 0, 7);
  ctx.fillStyle = '#050108'; ctx.fill();
  ctx.restore();

  drawArm();

  requestAnimationFrame(draw);
}

function drawArm() {
  const p = pivot();
  const len = R * 1.35;
  const ex = p.x + Math.cos(armAngle) * len;
  const ey = p.y + Math.sin(armAngle) * len;

  /* counterweight + pivot base */
  ctx.beginPath(); ctx.arc(p.x, p.y, R * 0.055, 0, 7);
  ctx.fillStyle = '#2a1a33'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(201,160,255,.35)'; ctx.stroke();
  const back = R * 0.16;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x - Math.cos(armAngle) * back, p.y - Math.sin(armAngle) * back);
  ctx.lineWidth = R * 0.028;
  ctx.strokeStyle = '#8fa3b8'; ctx.stroke();

  /* the arm — chrome line with a soft shadow beneath */
  ctx.beginPath();
  ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey + 3);
  ctx.lineWidth = R * 0.02;
  ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey);
  ctx.lineWidth = R * 0.016;
  const arm = ctx.createLinearGradient(p.x, p.y, ex, ey);
  arm.addColorStop(0, '#d9e4f0'); arm.addColorStop(1, '#8fa3b8');
  ctx.strokeStyle = arm; ctx.stroke();

  /* headshell + stylus */
  ctx.save();
  ctx.translate(ex, ey);
  ctx.rotate(armAngle + 0.5);
  ctx.fillStyle = dropping ? '#ff2e88' : '#f5c518';
  ctx.fillRect(-R * 0.035, -R * 0.014, R * 0.07, R * 0.028);
  ctx.restore();
}

requestAnimationFrame(draw);

/* ── pointer ────────────────────────────────────────────────────── */
/* INTERACTION -- one model, two bodies.
   Mouse: hover a groove to preview, click to drop in (fast path).
   Touch/pen: touch a groove to preview (the record eats the scroll),
   then HOLD to drop the needle -- a ring fills and carries you in.
   A tap alone never navigates: you have to mean it. */
function pick(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  return bandAt(Math.hypot(x - CX, y - CY));
}

function selectBand(i) {
  if (i === hover) return;
  hover = i;
  if (i >= 0) {
    const r = ROOMS[i], m = moodOf(i);
    setReadout(r.title, r.built
      ? (COARSE ? 'hold to drop the needle' : r.sub)
      : r.sub + ' · pressing soon');
    armTarget = armAngleFor(bandRadii(i).mid);
    accent = m.accent; accentTarget = 1; spinTarget = m.spin;
    igniteSparks(i);
    const t = performance.now();
    if (t - lastStemT > 110) { REV.audio.stem(r.id, r.tone); lastStemT = t; }
  } else {
    setReadout(' ', REST_SUB);
    armTarget = REST_ARM;
    accentTarget = 0; spinTarget = 1;
  }
}

function liftNeedle() {
  pressBand = -1; holdProg = 0;
  selectBand(-1);
}

function commit(room) {
  if (committing || dropping) return;
  committing = true; dropping = true;
  REV.audio.thunk();
  setTimeout(function () { routeTo(room, null); }, REV.stilled() ? 40 : 260);
}

/* MOUSE hover previews; TOUCH/PEN drag eats the scroll, reselects the
   groove, and resets the hold timer whenever the finger crosses bands. */
canvas.addEventListener('pointermove', function (e) {
  if (e.pointerType === 'mouse') { if (!dropping) selectBand(pick(e)); return; }
  if (dropping) return;
  e.preventDefault();
  const i = pick(e);
  if (i !== hover) {
    selectBand(i);
    if (i >= 0 && ROOMS[i].built) { pressBand = i; holdT0 = performance.now(); }
    else pressBand = -1;
  }
}, { passive: false });

canvas.addEventListener('pointerleave', function (e) {
  if (e.pointerType !== 'mouse' || dropping) return;
  selectBand(-1);
});

canvas.addEventListener('click', function () {
  if (lastPT !== 'mouse') return;
  if (hover < 0 || dropping) return;
  commit(ROOMS[hover]);
});

/* TOUCH / PEN -- press to preview, hold to enter */
canvas.addEventListener('pointerdown', function (e) {
  lastPT = e.pointerType;
  if (e.pointerType === 'mouse') return;
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  const i = pick(e);
  selectBand(i);
  if (i >= 0 && ROOMS[i].built) { pressBand = i; holdT0 = performance.now(); }
  else pressBand = -1;
}, { passive: false });

function touchEnd(e) {
  if (e.pointerType === 'mouse') return;
  if (committing) return;
  liftNeedle();
}
canvas.addEventListener('pointerup', touchEnd);
